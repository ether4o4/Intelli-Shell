apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

react {
    autolinkLibrariesWithApp()
    // Bundle the JS into every variant, including debug. Without this a
    // sideloaded debug APK looks for a Metro dev server, falls back to
    // assets://index.android.bundle, finds nothing, and crashes on launch.
    debuggableVariants = []
}

// Disabled for the preview build so ProGuard/R8 can't strip anything the app
// needs at runtime — guarantees the sideloaded APK launches. Re-enable to slim.
def enableProguardInReleaseBuilds = false

def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.vistalauncher"
    defaultConfig {
        applicationId "com.intellishell"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            storeFile file('release.keystore')
            storePassword System.getenv("INTELLISHELL_KEYSTORE_PASSWORD") ?: 'intellishell'
            keyAlias System.getenv("INTELLISHELL_KEY_ALIAS") ?: 'intellishell'
            keyPassword System.getenv("INTELLISHELL_KEY_PASSWORD") ?: 'intellishell'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Sign the release APK with the debug keystore so it installs by
            // sideloading with no secrets. A release build (unlike debug) has
            // React Native dev support OFF and the JS bundle baked into assets,
            // so it never falls back to a Metro dev server or shows a redbox.
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            shrinkResources enableProguardInReleaseBuilds
            zipAlignEnabled true
        }
    }

    // Split APKs by ABI for smaller download sizes
    splits {
        abi {
            enable true
            reset()
            include 'arm64-v8a', 'armeabi-v7a'
            universalApk true  // also emit a single install-anywhere APK
        }
    }

    // Rename APKs with version info
    applicationVariants.all { variant ->
        variant.outputs.each { output ->
            def versionName = variant.versionName
            def versionCode = variant.versionCode
            def abi = output.getFilter(com.android.build.OutputFile.ABI) ?: "universal"
            output.outputFileName = "intellishell-v${versionName}-${versionCode}-${abi}.apk"
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
