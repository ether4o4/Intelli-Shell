name: Publish IntelliShell APK

# Builds an installable (debug-signed) APK on every push to main and attaches it
# to a rolling, non-draft "android-preview" release marked --latest, so both
# URLs always serve the newest build:
#   https://github.com/ether4o4/Intelli-Shell/releases/latest/download/intellishell.apk
#   https://github.com/ether4o4/Intelli-Shell/releases/download/android-preview/intellishell.apk
on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      asset_name:
        description: 'APK file name'
        required: false
        default: intellishell.apk

permissions:
  contents: write

# The build compiles proot from source with the NDK (scripts/build-proot.sh) and
# bundles it per ABI, so the APK installs full Alpine Linux. If the compile fails
# for an ABI, that ABI ships the built-in toybox shell instead — the build never
# breaks.

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build proot from source (NDK)
        continue-on-error: true
        run: |
          chmod +x scripts/build-proot.sh
          ./scripts/build-proot.sh

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        run: |
          cd android
          # Release build: dev support off, JS bundled into assets, signed with
          # the debug keystore so it sideloads with no secrets.
          ./gradlew assembleRelease --no-configuration-cache

      - name: Stage APK
        env:
          ASSET_NAME: ${{ github.event.inputs.asset_name || 'intellishell.apk' }}
        run: |
          mkdir -p dist
          # The stable link serves the arm64 APK (~1/3 the size of universal —
          # a 300 MB mobile download kept failing). armv7 and universal ship as
          # extra assets for older phones.
          OUT=android/app/build/outputs/apk/release
          APK=$(ls $OUT/*arm64-v8a*.apk 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            APK=$(ls -S $OUT/*.apk | head -1)
          fi
          echo "Staging $APK -> dist/${ASSET_NAME}"
          cp "$APK" "dist/${ASSET_NAME}"
          V7=$(ls $OUT/*armeabi-v7a*.apk 2>/dev/null | head -1)
          [ -n "$V7" ] && cp "$V7" dist/intellishell-armv7.apk
          UNI=$(ls $OUT/*universal*.apk 2>/dev/null | head -1)
          [ -n "$UNI" ] && cp "$UNI" dist/intellishell-universal.apk
          ls -la dist/

      - name: Publish rolling release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASSET_NAME: ${{ github.event.inputs.asset_name || 'intellishell.apk' }}
          COMMIT_MSG: ${{ github.event.head_commit.message || github.sha }}
        run: |
          # Refresh the rolling release so the asset (and its stable URL) updates.
          # Notes carry the commit + build time so anyone can tell which build
          # the link currently serves.
          BUILT_AT=$(date -u '+%Y-%m-%d %H:%M UTC')
          SHORT_SHA=${GITHUB_SHA::7}
          SUBJECT=$(printf '%s' "$COMMIT_MSG" | head -n 1)
          NOTES=$(printf '%s\n\n%s\n%s' \
            "Rolling debug-signed APK: split-screen AI chat + live terminal, on-device or cloud models. Enable 'Install unknown apps' to sideload." \
            "**This build:** [\`${SHORT_SHA}\`](https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}) — ${SUBJECT}" \
            "**Built:** ${BUILT_AT} (run #${GITHUB_RUN_NUMBER})")
          gh release delete android-preview --yes --cleanup-tag 2>/dev/null || true
          gh release create android-preview dist/* \
            --title "IntelliShell — Android Preview (build ${SHORT_SHA})" \
            --notes "$NOTES" \
            --latest
